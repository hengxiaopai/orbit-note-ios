name: iOS Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    name: Build and Smoke Check Orbit Note
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show runner and Xcode environment
        run: |
          sw_vers
          xcodebuild -version
          xcode-select -p
          xcrun simctl list runtimes
          xcrun simctl list devices available

      - name: List project and schemes
        run: |
          xcodebuild -list -project OrbitNote.xcodeproj

      - name: Simulator runtime smoke check
        run: |
          bash scripts/ci/ios_runtime_smoke.sh

      - name: Build app for iOS Simulator
        run: |
          xcodebuild \
            -project OrbitNote.xcodeproj \
            -scheme OrbitNote \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            clean build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Build Widget target for iOS Simulator
        run: |
          xcodebuild \
            -project OrbitNote.xcodeproj \
            -target OrbitNoteWidget \
            -sdk iphonesimulator \
            -configuration Debug \
            build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Upload Xcode build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-build-logs
          path: |
            build/Logs
          if-no-files-found: ignore
