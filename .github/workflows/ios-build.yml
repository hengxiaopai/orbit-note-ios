name: iOS Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Orbit Note
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcrun simctl list runtimes

      - name: List project
        run: |
          xcodebuild -list -project OrbitNote.xcodeproj

      - name: Build for iOS Simulator
        run: |
          xcodebuild \
            -project OrbitNote.xcodeproj \
            -scheme OrbitNote \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            clean build
